# Пайплайн: линтинг спеки -> сборка -> публикация в GitLab Pages.
# Домен настраивается в Settings -> Pages; конфиг персонализирован init.py.
image: node:20

stages: [lint, build, deploy]

lint_spec:
  stage: lint
  script:
    - npx --yes @stoplight/spectral-cli lint "{{OPENAPI_PATH}}" --ruleset .spectral.yaml

build_docs:
  stage: build
  script:
    - npm ci
    - npm run gen-api
    - npm run build
  artifacts:
    paths: [build]

pages:
  stage: deploy
  script: [mkdir -p public, cp -r build/* public/]
  artifacts:
    paths: [public]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
