<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- знак: терминальная панель с промптом, в духе обложек статей -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#131C2E" stroke="#2A3548" stroke-width="2"/>
  <!-- строка заголовка панели -->
  <circle cx="14" cy="14" r="2.6" fill="#E26D6D"/>
  <circle cx="23" cy="14" r="2.6" fill="#E5A158"/>
  <circle cx="32" cy="14" r="2.6" fill="#59C389"/>
  <!-- промпт › -->
  <path d="M15 30 L27 40 L15 50" fill="none" stroke="#E5A158" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- курсор _ -->
  <rect x="33" y="45" width="16" height="5" rx="2.5" fill="#59C389">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1.6s" repeatCount="indefinite"/>
  </rect>
</svg>
