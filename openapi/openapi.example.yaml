openapi: 3.0.3
info:
  title: PayFlow API
  version: 1.3.0
  description: |
    Пример спеки, демонстрирующий возможности рендера: окружения (servers),
    авторизация (security), переиспользуемые схемы ($ref), перечисления,
    несколько именованных примеров, пагинация, каталог ошибок как схема.
    Замените своей спекой — структура разделов портала не изменится.

servers:
  - url: https://sandbox.api.payflow.example
    description: Sandbox — тестовое окружение
  - url: https://api.payflow.example
    description: Production

security:
  - bearerAuth: []

tags:
  - name: payments
    description: >
      Приём и исполнение платежей. Порядок вызовов и бизнес-контекст —
      в разделе «Сценарии».
  - name: refunds
    description: Возвраты по исполненным платежам.

paths:
  /v1/payments:
    post:
      tags: [payments]
      operationId: createPayment
      summary: Создать платёж
      description: >
        Создаёт платёж. Требует пройденной идентификации клиента (KYC).
        Платежи свыше дневного лимита переходят в статус pending_approval —
        см. сценарий «Платёж, требующий ручного одобрения».
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
            examples:
              обычный платёж:
                value: { amount: 120000, currency: RUB, customer_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6" }
              платёж сверх лимита:
                summary: Уйдёт на ручное одобрение
                value: { amount: 750000, currency: RUB, customer_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6" }
      responses:
        "201":
          description: Платёж создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
              example: { id: "pay_01HZX3", status: processing, amount: 120000, currency: RUB }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          description: Клиент не прошёл KYC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example: { code: E2004, message: "KYC не завершён", doc: "/errors#e2004" }
    get:
      tags: [payments]
      operationId: listPayments
      summary: Список платежей
      description: Постраничный список платежей с фильтром по статусу.
      parameters:
        - name: status
          in: query
          description: Фильтр по статусу
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: Страница списка
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  next_cursor:
                    type: string
                    nullable: true
                    description: Курсор следующей страницы; null — страниц больше нет
              example:
                items:
                  - { id: "pay_01HZX3", status: settled, amount: 120000, currency: RUB }
                next_cursor: null
        "401":
          $ref: '#/components/responses/Unauthorized'

  /v1/payments/{payment_id}:
    get:
      tags: [payments]
      operationId: getPayment
      summary: Статус платежа
      description: Текущее состояние платежа. Статусная модель — в разделе «Сценарии».
      parameters:
        - name: payment_id
          in: path
          required: true
          schema: { type: string }
          example: pay_01HZX3
      responses:
        "200":
          description: Текущее состояние
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
              example: { id: "pay_01HZX3", status: settled, amount: 120000, currency: RUB }
        "404":
          description: Платёж не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example: { code: E3001, message: "Платёж не найден", doc: "/errors#e3001" }

  /v1/refunds:
    post:
      tags: [refunds]
      operationId: createRefund
      summary: Создать возврат
      description: Возврат по платежу в статусе settled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id]
              properties:
                payment_id: { type: string, example: pay_01HZX3 }
                reason:
                  type: string
                  description: Причина (устаревшее поле, переезжает в metadata)
                  deprecated: true
      responses:
        "201":
          description: Возврат создан
          content:
            application/json:
              example: { id: "rf_01J2K7", payment_id: "pay_01HZX3", status: refunded }
        "409":
          description: Платёж не в статусе settled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example: { code: E4102, message: "Возврат возможен только из settled", doc: "/errors#e4102" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'API-ключ: `Authorization: Bearer sk_test_...` (см. раздел «Аутентификация»)'
  parameters:
    Limit:
      name: limit
      in: query
      description: Размер страницы (1–100)
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    Cursor:
      name: cursor
      in: query
      description: Курсор из next_cursor предыдущей страницы
      schema: { type: string }
  responses:
    Unauthorized:
      description: Ключ неверен, отозван или не передан
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example: { code: E1001, message: "Неверный или отозванный ключ", doc: "/errors#e1001" }
  schemas:
    PaymentStatus:
      type: string
      description: Статусная модель платежа (переходы — в разделе «Сценарии»)
      enum: [created, awaiting_kyc, pending_approval, processing, settled, rejected, refunded]
    PaymentRequest:
      type: object
      required: [amount, currency, customer_id]
      properties:
        amount:
          type: integer
          description: Сумма в минорных единицах (копейках)
          minimum: 1
        currency:
          type: string
          example: RUB
        customer_id:
          type: string
          format: uuid
          description: Клиент, прошедший KYC
    Payment:
      type: object
      properties:
        id: { type: string, example: pay_01HZX3 }
        status:
          $ref: '#/components/schemas/PaymentStatus'
        amount: { type: integer }
        currency: { type: string }
    Error:
      type: object
      description: Единый формат ошибки; полный каталог кодов — страница «Каталог ошибок»
      properties:
        code:
          type: string
          description: Машиночитаемый код (ищется в каталоге ошибок)
          example: E2004
        message: { type: string }
        doc:
          type: string
          description: Ссылка на разбор кода в документации
